<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Master Schedule — Audition Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .legend-panel {
      width: 180px;
      flex-shrink: 0;
      padding: 12px 16px;
      background: #f8f8f8;
      border: 1px solid #ddd;
      border-radius: 6px;
      min-height: 200px;
    }
    .schedule-wrapper {
      overflow-x: auto;
    }
  </style>
</head>
<body style="visibility:hidden">

  <!-- Piece assignment modal -->
  <div class="modal fade" id="pieceModal" tabindex="-1" aria-labelledby="pieceModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="pieceModalLabel">Assign Block to a Piece</h5>
        </div>
        <div class="modal-body">

          <div class="mb-3">
            <div class="form-check">
              <input class="form-check-input" type="radio" name="pieceRadio" id="radio-new-piece" checked>
              <label class="form-check-label" for="radio-new-piece">Create new piece</label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="radio" name="pieceRadio" id="radio-existing-piece">
              <label class="form-check-label" for="radio-existing-piece">Add to existing piece</label>
            </div>
          </div>

          <div id="new-piece-section">
            <label for="new-piece-name" class="form-label">Piece name</label>
            <input type="text" class="form-control" id="new-piece-name" placeholder="e.g. Stefan's piece">
          </div>

          <div id="existing-piece-section" style="display:none;">
            <label for="existing-piece-select" class="form-label">Select piece</label>
            <select class="form-select" id="existing-piece-select"></select>
          </div>

        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" id="piece-cancel-btn">Cancel</button>
          <button type="button" class="btn btn-primary" id="piece-confirm-btn">Confirm</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Nav -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">Audition Portal</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav">
          <li class="nav-item">
            <a class="nav-link" href="search.html">Search Dancers</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" href="master.html">Master Schedule</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="cast.html">Cast Builder</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="dancers.html">Auditionees</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Main content -->
  <div class="container-fluid mt-4 px-4">
    <div class="d-flex gap-4 align-items-flex-start">

      <!-- Legend sidebar -->
      <div class="legend-panel">
        <h6 class="mb-3" style="font-weight:bold;">Pieces</h6>
        <div id="pieces-legend"></div>
      </div>

      <!-- Schedule -->
      <div>
        <h5 class="mb-2">Master Schedule</h5>
        <p class="text-muted" style="font-size:13px;">Drag to create a rehearsal block. Click &times; to delete.</p>
        <div class="schedule-wrapper">
          <div class="day-header-row" id="day-header-row"></div>
          <div class="schedule-container">
            <div class="time-column" id="time-column"></div>
            <div class="grid" id="grid"></div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- Update button -->
  <div class="container-fluid px-4 mt-3">
    <div id="update-alert" class="alert alert-success d-none" role="alert">
      Schedule updated! You can now view dancer availability on the
      <a href="search.html" class="alert-link">Search Dancers</a> page.
    </div>
    <button id="update-btn" class="btn btn-success">Update Schedule</button>
  </div>

  <script src="master-schedule.js"></script>
  <script>
    document.getElementById('update-btn').addEventListener('click', () => {
      const alert = document.getElementById('update-alert');
      alert.classList.remove('d-none');
      setTimeout(() => alert.classList.add('d-none'), 6000);
    });
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    // Auth check — masters only
    (async () => {
      try {
        const res  = await fetch('/api/auth/me');
        const user = await res.json();
        if (!res.ok || user.role !== 'master') {
          window.location.href = 'login.html';
          return;
        }
        document.querySelectorAll('.nav-link[href="auditionForm.html"]')
          .forEach(el => el.parentElement.remove());
        const nav = document.querySelector('.navbar-nav');
        nav.insertAdjacentHTML('beforeend',
          `<li class="nav-item"><span class="nav-link text-white-50">${user.email}</span></li>
           <li class="nav-item"><button class="btn btn-link nav-link text-white" id="logout-btn">Log Out</button></li>`
        );
        document.getElementById('logout-btn').addEventListener('click', async () => {
          await fetch('/api/auth/logout', { method: 'POST' });
          window.location.href = 'login.html';
        });
        document.body.style.visibility = 'visible';
      } catch (err) {
        window.location.href = 'login.html';
      }
    })();
  </script>

</body>
</html>
