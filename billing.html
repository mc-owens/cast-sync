<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Billing | CastSync</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="app-shell.css">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>
<body style="visibility:hidden">

  <div id="app-shell-root"></div>
  <script src="app-shell.js"></script>

  <div class="app-main">
  <div class="container-fluid mt-4 px-4" style="max-width: 640px;">

    <div class="mb-3">
      <h5 class="mb-0 fw-semibold">Billing</h5>
      <p class="text-muted mb-0" style="font-size:13px;" id="account-email">Loading…</p>
    </div>

    <div class="app-card mb-4">
      <h6 class="label-gold mb-3">Billing</h6>
      <p class="text-muted mb-3" style="font-size:13px;">View payment history, download receipts, and manage your payment method.</p>
      <div id="billing-error" class="alert alert-danger d-none" style="font-size:13px;"></div>
      <button class="btn btn-dark btn-sm" id="billing-portal-btn">Open Billing Portal →</button>
    </div>

  </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    (async () => {
      try {
        const res  = await fetch('/api/auth/me');
        const user = await res.json();
        if (!res.ok || (user.role !== 'master' && user.mode !== 'director')) { window.location.href = 'login.html'; return; }
        document.getElementById('account-email').textContent = user.email;
        const nav = document.querySelector('.navbar-nav');
        nav.insertAdjacentHTML('beforeend',
          `<li class="nav-item"><span class="nav-link nav-context">${user.orgName || ''} · ${user.seasonName || ''}</span></li>`
        );
        document.getElementById('right-nav').innerHTML =
          `<button class="btn-nav-logout" id="logout-btn">Log Out</button>`;
        document.getElementById('logout-btn').addEventListener('click', async () => {
          await fetch('/api/auth/logout', { method: 'POST' });
          window.location.href = 'login.html';
        });
        document.body.style.visibility = 'visible';
      } catch (e) { window.location.href = 'login.html'; }
    })();

    // Billing portal
    document.getElementById('billing-portal-btn').addEventListener('click', async () => {
      const btn    = document.getElementById('billing-portal-btn');
      const errEl  = document.getElementById('billing-error');
      errEl.classList.add('d-none');
      btn.disabled    = true;
      btn.textContent = 'Opening…';
      try {
        const res  = await fetch('/api/billing/portal', { method: 'POST' });
        const data = await res.json();
        if (!res.ok) { errEl.textContent = data.error; errEl.classList.remove('d-none'); return; }
        window.location.href = data.url;
      } catch (e) {
        errEl.textContent = 'Could not open billing portal. Try again.';
        errEl.classList.remove('d-none');
      } finally {
        btn.disabled    = false;
        btn.textContent = 'Open Billing Portal →';
      }
    });
  </script>

</body>
</html>
