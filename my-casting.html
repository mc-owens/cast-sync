<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Casting — CastSync</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .piece-block { border-top: 1px solid #e8e8e8; padding-top: 14px; margin-bottom: 20px; }
    .cast-name { font-size: 14px; margin: 3px 0; }
    .role-badge {
      font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 10px;
      vertical-align: middle; margin-left: 8px; text-transform: uppercase; letter-spacing: .4px;
    }
    .role-badge.member     { background: #d4edda; color: #155724; }
    .role-badge.understudy { background: #fff3cd; color: #856404; }
    .piece-block.not-cast .cast-name { color: #888; }
    .you-label { font-size: 11px; color: #198754; font-weight: 600; margin-left: 6px; }
  </style>
  <link rel="icon" href="logo.png" type="image/png">
</head>
<body style="visibility:hidden">

  <nav class="navbar navbar-expand-lg app-nav">
    <div class="container-fluid">
      <a class="navbar-brand" href="#"><img src="logo.png" width="20" height="20" alt="" style="vertical-align:middle;margin-right:6px;margin-bottom:2px;">CastSync</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item"><a class="nav-link" href="auditionForm.html">Audition Form</a></li>
          <li class="nav-item"><a class="nav-link" href="my-submissions.html">My Submissions</a></li>
          <li class="nav-item"><a class="nav-link active" href="my-casting.html">Casting</a></li>
          <li class="nav-item"><a class="nav-link" href="upgrade.html">Director Access</a></li>
          <li class="nav-item d-flex align-items-center d-none" id="switch-director-item">
            <button class="btn btn-outline-secondary btn-sm ms-1" id="switch-mode-btn" style="font-size:12px;">Switch to Director</button>
          </li>
        </ul>
        <div class="d-flex align-items-center gap-3" id="right-nav"></div>
      </div>
    </div>
  </nav>

  <div class="container mt-4" style="max-width:700px;">
    <h5 class="mb-1 fw-semibold">Casting</h5>
    <p class="text-muted mb-4" style="font-size:13px;">Cast lists for organizations you've auditioned for. Directors control when results are visible.</p>

    <div id="loading-msg" class="text-muted">Loading…</div>

    <div id="empty-msg" class="alert alert-info d-none">
      You haven't submitted any audition forms yet, or no cast lists have been published yet.
    </div>

    <div id="orgs-container"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    async function loadCasting() {
      try {
        const res  = await fetch('/api/my-casting');
        const data = await res.json();
        const orgs   = data.orgs   || [];
        const viewer = data.viewer || null;
        if (viewer) window._castingUserName = { first: viewer.first_name, last: viewer.last_name };

        document.getElementById('loading-msg').style.display = 'none';

        if (orgs.length === 0) {
          document.getElementById('empty-msg').classList.remove('d-none');
          return;
        }

        const container = document.getElementById('orgs-container');
        let anyVisible = false;

        orgs.forEach(org => {
          const card = document.createElement('div');
          card.className = 'card mb-4';

          // ── Org header ────────────────────────────────────────────────────
          const myPieces = (org.pieces || []).filter(p => p.my_role);
          let summaryBadge = '';
          if (org.casting_published && myPieces.length > 0) {
            summaryBadge = `<span class="badge bg-success ms-2" style="font-size:11px;">
              You're in ${myPieces.length} piece${myPieces.length !== 1 ? 's' : ''}
            </span>`;
          }

          let cardHTML = `
            <div class="card-header d-flex align-items-center justify-content-between" style="background:#f8f9fa;">
              <div>
                <span class="fw-bold">${org.org_name}</span>
                <span class="text-muted ms-2" style="font-size:12px;">${org.season_name}</span>
                ${summaryBadge}
              </div>
            </div>
            <div class="card-body" style="padding:20px 24px;">`;

          if (!org.casting_published) {
            cardHTML += `<p class="text-muted mb-0" style="font-size:13px;">Casting results haven't been published yet.</p>`;
          } else {
            anyVisible = true;

            if (!org.pieces || org.pieces.length === 0) {
              cardHTML += `<p class="text-muted mb-0" style="font-size:13px;">No pieces in the schedule yet.</p>`;
            } else {
              org.pieces.forEach(p => {
                const blocks      = p.blocks || [];
                const casts       = p.casts  || [];
                const members     = casts.filter(c => c.cast_role === 'member');
                const understudies = casts.filter(c => c.cast_role === 'understudy');
                const rehearsalStr = blocks.length
                  ? blocks.map(b => `${b.day} ${b.start_time}–${b.end_time}`).join(', ')
                  : 'TBD';

                const inPiece    = !!p.my_role;
                const blockClass = inPiece ? 'piece-block' : 'piece-block not-cast';

                let roleBadge = '';
                if (p.my_role === 'member')     roleBadge = `<span class="role-badge member">Cast</span>`;
                if (p.my_role === 'understudy') roleBadge = `<span class="role-badge understudy">Understudy</span>`;

                cardHTML += `<div class="${blockClass}">`;
                if (p.choreographer_name) {
                  cardHTML += `<div class="d-flex align-items-center gap-2 mb-1">
                    <strong style="font-size:15px;">${p.choreographer_name}</strong>
                    ${roleBadge}
                  </div>`;
                  if (p.choreographer_email) cardHTML += `<p style="font-size:13px;color:#555;margin-bottom:6px;"><a href="mailto:${p.choreographer_email}" style="color:#555;">${p.choreographer_email}</a></p>`;
                } else {
                  cardHTML += `<div class="d-flex align-items-center gap-2 mb-1">
                    <strong style="font-size:15px;color:#aaa;font-style:italic;">No choreographer listed</strong>
                    ${roleBadge}
                  </div>`;
                }
                cardHTML += `<p style="font-size:13px;color:#555;margin-bottom:10px;">Rehearsals: ${rehearsalStr}</p>`;

                if (members.length === 0 && understudies.length === 0) {
                  cardHTML += `<p style="font-size:13px;color:#aaa;font-style:italic;">No cast assigned yet.</p>`;
                } else {
                  members.forEach(c => {
                    cardHTML += `<p class="cast-name" data-first="${c.first_name}" data-last="${c.last_name}">${c.first_name} ${c.last_name}</p>`;
                  });
                  understudies.forEach(c => {
                    cardHTML += `<p class="cast-name" data-first="${c.first_name}" data-last="${c.last_name}">${c.first_name} ${c.last_name} <span style="color:#888;font-size:12px;">(understudy)</span></p>`;
                  });
                }
                cardHTML += `</div>`;
              });
            }
          }

          cardHTML += `</div>`; // card-body
          card.innerHTML = cardHTML;
          container.appendChild(card);
        });

        // Tag the user's own name rows (done after DOM insert, using global userName)
        if (window._castingUserName) {
          const { first, last } = window._castingUserName;
          document.querySelectorAll('.cast-name').forEach(el => {
            if (el.dataset.first === first && el.dataset.last === last) {
              el.innerHTML += `<span class="you-label">you</span>`;
              el.style.fontWeight = '600';
            }
          });
        }

        if (!anyVisible && orgs.length > 0) {
          document.getElementById('empty-msg').textContent =
            'No cast lists have been published yet. Check back after your audition results are announced.';
          document.getElementById('empty-msg').classList.remove('d-none');
        }

      } catch (err) {
        document.getElementById('loading-msg').textContent = 'Could not load casting results.';
      }
    }

    loadCasting();
  </script>

  <script>
    (async () => {
      try {
        const res  = await fetch('/api/auth/me');
        const user = await res.json();
        if (!res.ok) { window.location.href = 'login.html'; return; }
        if (user.mode === 'director' || (user.role === 'master' && user.mode !== 'auditionee')) { window.location.href = 'org-select.html'; return; }

        document.getElementById('right-nav').className = 'app-nav-right';
        document.getElementById('right-nav').innerHTML =
          `<a href="account.html">Account</a>
           <button id="logout-btn">Log Out</button>`;
        document.getElementById('logout-btn').addEventListener('click', async () => {
          await fetch('/api/auth/logout', { method: 'POST' });
          window.location.href = 'login.html';
        });
        if (user.isDirector) {
          document.getElementById('switch-director-item').classList.remove('d-none');
          document.getElementById('switch-mode-btn').addEventListener('click', async () => {
            await fetch('/api/auth/switch-mode', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ mode:'director' }) });
            window.location.href = 'org-select.html';
          });
        }
        document.body.style.visibility = 'visible';
      } catch (err) { window.location.href = 'login.html'; }
    })();
  </script>

</body>
</html>
