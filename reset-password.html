<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — CastSync</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="logo.png" type="image/png">
</head>
<body>

  <nav class="navbar app-nav">
    <div class="container-fluid">
      <a class="navbar-brand" href="#"><img src="logo-nav.svg" width="22" height="22" alt="" style="vertical-align:middle;margin-right:6px;margin-bottom:2px;">CastSync</a>
    </div>
  </nav>

  <div class="container" style="max-width:420px;margin-top:80px;">
    <div id="invalid-msg" class="alert alert-danger d-none">
      This reset link is invalid or has expired.
      <a href="forgot-password.html" class="alert-link">Request a new one.</a>
    </div>

    <div id="form-wrapper">
      <h4 class="mb-1 fw-semibold">Set New Password</h4>
      <p class="text-muted mb-4" style="font-size:14px;">Choose a new password for your account.</p>

      <div id="error-msg" class="alert alert-danger d-none"></div>

      <form id="reset-form">
        <div class="mb-3">
          <label for="password" class="form-label">New Password</label>
          <input type="password" class="form-control" id="password" minlength="6" required />
          <div class="form-text">At least 6 characters.</div>
        </div>
        <div class="mb-3">
          <label for="password2" class="form-label">Confirm Password</label>
          <input type="password" class="form-control" id="password2" required />
        </div>
        <button type="submit" class="btn btn-primary w-100" id="submit-btn">Set Password</button>
      </form>
    </div>
  </div>

  <script>
    const token = new URLSearchParams(window.location.search).get('token');
    if (!token) {
      document.getElementById('form-wrapper').style.display = 'none';
      document.getElementById('invalid-msg').classList.remove('d-none');
    }

    document.getElementById('reset-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorEl   = document.getElementById('error-msg');
      const submitBtn = document.getElementById('submit-btn');
      const password  = document.getElementById('password').value;
      const password2 = document.getElementById('password2').value;

      errorEl.classList.add('d-none');

      if (password !== password2) {
        errorEl.textContent = 'Passwords do not match.';
        errorEl.classList.remove('d-none');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Saving…';

      try {
        const res  = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password }),
        });
        const data = await res.json();
        if (!res.ok) {
          if (res.status === 400 || res.status === 404) {
            document.getElementById('form-wrapper').style.display = 'none';
            document.getElementById('invalid-msg').classList.remove('d-none');
          } else {
            errorEl.textContent = data.error || 'Something went wrong.';
            errorEl.classList.remove('d-none');
            submitBtn.disabled = false;
            submitBtn.textContent = 'Set Password';
          }
          return;
        }
        // Success — redirect to login
        window.location.href = 'login.html?reset=1';
      } catch (err) {
        errorEl.textContent = 'Could not connect to the server.';
        errorEl.classList.remove('d-none');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Set Password';
      }
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
