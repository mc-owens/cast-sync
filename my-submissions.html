<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Submissions — CastSync</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body style="visibility:hidden">

  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">CastSync</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item">
            <a class="nav-link" href="auditionForm.html">Audition Form</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" href="my-submissions.html">My Submissions</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="upgrade.html">Director Access</a>
          </li>
          <li class="nav-item d-flex align-items-center d-none" id="switch-director-item">
            <button class="btn btn-outline-light btn-sm ms-1" id="switch-mode-btn" style="font-size:12px;">Switch to Director</button>
          </li>
        </ul>
        <div class="d-flex align-items-center gap-3" id="right-nav"></div>
      </div>
    </div>
  </nav>

  <div class="container mt-4" style="max-width:640px;">
    <h5 class="mb-1 fw-semibold">My Submissions</h5>
    <p class="text-muted mb-4" style="font-size:13px;">Every audition form you've submitted. Click Update to revise your information for that organization.</p>

    <div id="loading-msg" class="text-muted">Loading...</div>
    <div id="empty-msg" class="alert alert-info d-none">
      You haven't submitted any audition forms yet. Head to the <a href="auditionForm.html" class="alert-link">Audition Form</a> to get started.
    </div>
    <div id="submissions-list"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    function formatDate(iso) {
      return new Date(iso).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
    }

    async function loadSubmissions() {
      try {
        const res  = await fetch('/api/my-submissions');
        const subs = await res.json();
        document.getElementById('loading-msg').style.display = 'none';
        if (subs.length === 0) { document.getElementById('empty-msg').classList.remove('d-none'); return; }
        const list = document.getElementById('submissions-list');
        subs.forEach(s => {
          const card = document.createElement('div');
          card.className = 'card mb-3';
          card.innerHTML = `
            <div class="card-body d-flex justify-content-between align-items-center">
              <div>
                <div class="fw-semibold">${s.org_name}</div>
                <div class="text-muted" style="font-size:13px;">${s.season_name} &nbsp;·&nbsp; Submitted ${formatDate(s.created_at)}</div>
              </div>
              <a href="auditionForm.html?code=${encodeURIComponent(s.join_code)}"
                 class="btn btn-sm btn-outline-dark">Update</a>
            </div>`;
          list.appendChild(card);
        });
      } catch (err) {
        document.getElementById('loading-msg').textContent = 'Could not load submissions.';
      }
    }

    loadSubmissions();
  </script>

  <script>
    (async () => {
      try {
        const res  = await fetch('/api/auth/me');
        const user = await res.json();
        if (!res.ok) { window.location.href = 'login.html'; return; }
        if (user.role === 'master' || user.mode === 'director') { window.location.href = 'org-select.html'; return; }

        document.getElementById('right-nav').innerHTML =
          `<span class="text-white-50" style="font-size:13px;">${user.email}</span>
           <button class="btn btn-link nav-link text-white p-0" id="logout-btn">Log Out</button>`;
        document.getElementById('logout-btn').addEventListener('click', async () => {
          await fetch('/api/auth/logout', { method: 'POST' });
          window.location.href = 'login.html';
        });
        if (user.isDirector) {
          document.getElementById('switch-director-item').classList.remove('d-none');
          document.getElementById('switch-mode-btn').addEventListener('click', async () => {
            await fetch('/api/auth/switch-mode', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ mode:'director' }) });
            window.location.href = 'org-select.html';
          });
        }
        document.body.style.visibility = 'visible';
      } catch (err) { window.location.href = 'login.html'; }
    })();
  </script>

</body>
</html>
