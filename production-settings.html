<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Production Settings | CastSync</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="app-shell.css">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>
<body style="visibility:hidden">

  <div id="app-shell-root"></div>
  <script src="app-shell.js"></script>

  <div class="app-main">

  <!-- Trial banner -->
  <div id="trial-banner" style="display:none;background:#fefce8;border-bottom:1px solid #fde68a;">
    <div class="container-fluid px-4 py-2 d-flex align-items-center justify-content-between gap-3">
      <span style="font-size:13px;color:#92400e;" id="trial-banner-text"></span>
      <div class="d-flex gap-2 flex-shrink-0">
        <a href="plan-select.html" class="btn btn-sm btn-warning" style="font-size:12px;font-weight:600;">Upgrade</a>
        <button class="btn btn-sm btn-link p-0" style="font-size:12px;color:#92400e;text-decoration:none;" id="trial-banner-dismiss">Dismiss</button>
      </div>
    </div>
  </div>

  <!-- Main content -->
  <div class="container-fluid mt-4 px-4" style="max-width: 640px;">

    <div class="mb-3">
      <h5 class="mb-0 fw-semibold">Production Settings</h5>
      <p class="text-muted mb-0" style="font-size:13px;" id="page-subtitle">Loading…</p>
    </div>

    <div class="app-card mb-4">
      <h6 class="label-gold mb-3">General</h6>

      <div class="mb-4">
        <label class="form-label" style="font-size:13px;font-weight:600;">Production Name</label>
        <div class="d-flex gap-2">
          <input type="text" class="form-control form-control-sm" id="prod-name-input" autocomplete="off">
          <button class="btn btn-sm btn-dark" id="prod-name-save-btn">Save</button>
        </div>
        <div id="prod-name-msg" class="mt-1" style="font-size:12px;"></div>
      </div>

      <div class="row g-3">
        <div class="col-sm-6">
          <label class="form-label" style="font-size:13px;font-weight:600;">Production Start Date</label>
          <input type="date" class="form-control form-control-sm" id="start-date-input">
        </div>
        <div class="col-sm-6">
          <label class="form-label" style="font-size:13px;font-weight:600;">Production End Date</label>
          <input type="date" class="form-control form-control-sm" id="end-date-input">
        </div>
        <div class="col-sm-6">
          <label class="form-label" style="font-size:13px;font-weight:600;">Audition Date</label>
          <input type="date" class="form-control form-control-sm" id="audition-date-input">
        </div>
      </div>
      <p class="text-muted mt-2 mb-0" style="font-size:12px;">
        All dates are optional. Setting a start and end date turns on week-by-week navigation on the
        <a href="master.html">Master Schedule</a> page.
      </p>
      <span id="dates-saved-msg" class="text-success d-none" style="font-size:12px;">Saved.</span>
    </div>

    <div class="app-card mb-4">
      <h6 class="label-gold mb-3">Performance Dates</h6>
      <p class="text-muted mb-3" style="font-size:12px;">
        Add one date per show. Each one shows up directly on the
        <a href="master.html">Master Schedule</a> page when you navigate to that week.
      </p>
      <div id="performance-dates-list" class="mb-2"></div>
      <div class="d-flex gap-2">
        <input type="date" class="form-control form-control-sm" id="new-performance-date-input" style="max-width:200px;">
        <button class="btn btn-sm btn-outline-secondary" id="add-performance-date-btn">Add</button>
      </div>
      <div id="performance-date-error" class="text-danger mt-1 d-none" style="font-size:12px;"></div>
    </div>

  </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    (async () => {
      try {
        const res  = await fetch('/api/auth/me');
        const user = await res.json();
        if (!res.ok || (user.role !== 'master' && user.mode !== 'director')) { window.location.href = 'login.html'; return; }
        if (!user.orgId) { window.location.href = 'org-select.html'; return; }
        const nav = document.querySelector('.navbar-nav');
        nav.insertAdjacentHTML('beforeend',
          `<li class="nav-item"><span class="nav-link nav-context">${user.orgName} · ${user.seasonName}</span></li>`
        );
        document.getElementById('right-nav').innerHTML =
          window.renderProductionSwitcher(user) +
          `<button class="btn-nav-logout" id="logout-btn">Log Out</button>`;
        window.initProductionSwitcher();
        document.getElementById('logout-btn').addEventListener('click', async () => {
          await fetch('/api/auth/logout', { method: 'POST' });
          window.location.href = 'login.html';
        });
        document.getElementById('page-subtitle').textContent = `${user.orgName} · ${user.seasonName}`;
        document.getElementById('prod-name-input').value = user.seasonName || '';
        document.body.style.visibility = 'visible';

        document.getElementById('prod-name-save-btn').addEventListener('click', async () => {
          const name = document.getElementById('prod-name-input').value.trim();
          const msgEl = document.getElementById('prod-name-msg');
          if (!name) { msgEl.textContent = 'Name cannot be empty.'; msgEl.className = 'mt-1 text-danger'; msgEl.style.fontSize = '12px'; return; }
          try {
            const r = await fetch(`/api/orgs/${user.orgId}/seasons/${user.seasonId}`, {
              method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name }),
            });
            const data = await r.json();
            if (!r.ok) { msgEl.textContent = data.error || 'Could not rename production.'; msgEl.className = 'mt-1 text-danger'; msgEl.style.fontSize = '12px'; return; }
            msgEl.textContent = 'Saved.'; msgEl.className = 'mt-1 text-success'; msgEl.style.fontSize = '12px';
            setTimeout(() => { msgEl.textContent = ''; }, 2500);
          } catch (e) {
            msgEl.textContent = 'Could not connect to server.'; msgEl.className = 'mt-1 text-danger'; msgEl.style.fontSize = '12px';
          }
        });

        try {
          const datesRes = await fetch('/api/season/production-dates');
          if (datesRes.ok) {
            const dates = await datesRes.json();
            document.getElementById('start-date-input').value    = dates.start_date || '';
            document.getElementById('end-date-input').value      = dates.end_date || '';
            document.getElementById('audition-date-input').value = dates.audition_date || '';
          }
        } catch (e) { /* leave fields blank, no big deal */ }

        const dateFieldMap = {
          'start-date-input': 'start_date',
          'end-date-input': 'end_date',
          'audition-date-input': 'audition_date',
        };
        Object.keys(dateFieldMap).forEach(inputId => {
          document.getElementById(inputId).addEventListener('change', async () => {
            const savedEl = document.getElementById('dates-saved-msg');
            try {
              const r = await fetch('/api/season/production-dates', {
                method: 'PATCH', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ [dateFieldMap[inputId]]: document.getElementById(inputId).value }),
              });
              if (!r.ok) { const data = await r.json(); alert(data.error || 'Could not save production dates.'); return; }
              savedEl.classList.remove('d-none');
              setTimeout(() => savedEl.classList.add('d-none'), 2000);
            } catch (e) { alert('Could not connect to server.'); }
          });
        });

        // ── Performance dates (a production can have more than one show night) ──

        async function loadPerformanceDates() {
          const listEl = document.getElementById('performance-dates-list');
          try {
            const r = await fetch('/api/season/performance-dates');
            const performanceDates = r.ok ? await r.json() : [];
            listEl.innerHTML = performanceDates.map(d => {
              const nice = new Date(`${d.date}T00:00:00`).toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
              return `
                <div class="d-flex align-items-center justify-content-between mb-1" data-perf-date-row="${d.id}">
                  <span style="font-size:13px;">${nice}</span>
                  <button type="button" class="btn-close" style="font-size:9px;" data-delete-perf-date="${d.id}" aria-label="Remove date"></button>
                </div>`;
            }).join('') || '<div class="text-muted" style="font-size:12px;">No performance dates yet.</div>';

            listEl.querySelectorAll('[data-delete-perf-date]').forEach(btn => {
              btn.addEventListener('click', async () => {
                const res = await fetch(`/api/season/performance-dates/${btn.dataset.deletePerfDate}`, { method: 'DELETE' });
                if (!res.ok) { const data = await res.json(); alert(data.error || 'Could not remove date.'); return; }
                loadPerformanceDates();
              });
            });
          } catch (e) { listEl.innerHTML = '<div class="text-danger" style="font-size:12px;">Could not load performance dates.</div>'; }
        }
        loadPerformanceDates();

        document.getElementById('add-performance-date-btn').addEventListener('click', async () => {
          const input = document.getElementById('new-performance-date-input');
          const errEl = document.getElementById('performance-date-error');
          errEl.classList.add('d-none');
          if (!input.value) return;
          try {
            const res = await fetch('/api/season/performance-dates', {
              method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ date: input.value }),
            });
            const data = await res.json();
            if (!res.ok) { errEl.textContent = data.error || 'Could not add date.'; errEl.classList.remove('d-none'); return; }
            input.value = '';
            loadPerformanceDates();
          } catch (e) { errEl.textContent = 'Could not connect to server.'; errEl.classList.remove('d-none'); }
        });

        try {
          const subRes = await fetch('/api/subscription');
          if (subRes.ok) {
            const sub = await subRes.json();
            if (sub.isTrial) {
              const days = sub.daysRemaining;
              document.getElementById('trial-banner-text').textContent =
                days <= 1 ? 'Explore mode: your trial expires today. Upgrade to start your first real production.' : `Explore mode: ${days} day${days === 1 ? '' : 's'} left to explore. Upgrade any time to start your first real production.`;
              document.getElementById('trial-banner').style.display = '';
              document.getElementById('trial-banner-dismiss').addEventListener('click', () => {
                document.getElementById('trial-banner').style.display = 'none';
              });
            }
          }
        } catch (_) {}
      } catch (err) {
        window.location.href = 'login.html';
      }
    })();
  </script>
</body>
</html>
