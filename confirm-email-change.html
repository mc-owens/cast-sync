<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Confirm Email Change | CastSync</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>
<body>

  <nav class="navbar app-nav">
    <div class="container-fluid">
      <a class="navbar-brand" href="index.html">
        <img src="logo-nav.png" width="22" height="22" alt="" style="vertical-align:middle;margin-right:6px;margin-bottom:2px;">CastSync
      </a>
    </div>
  </nav>

  <div class="container" style="max-width:420px;margin-top:100px;text-align:center;">

    <!-- Loading state -->
    <div id="view-loading">
      <div class="spinner-border text-secondary mb-3" role="status"></div>
      <p class="text-muted">Confirming your new email…</p>
    </div>

    <!-- Success state -->
    <div id="view-success" style="display:none;">
      <div style="font-size:48px;margin-bottom:16px;">✓</div>
      <h4 class="fw-semibold mb-2">Email updated</h4>
      <p class="text-muted mb-4" style="font-size:14px;">Your CastSync login email is now <strong id="new-email"></strong>. Use it next time you log in.</p>
      <a href="login.html" class="btn btn-dark">Go to Login</a>
    </div>

    <!-- Error state -->
    <div id="view-error" style="display:none;">
      <div style="font-size:48px;margin-bottom:16px;">✕</div>
      <h4 class="fw-semibold mb-2">Link expired or already used</h4>
      <p class="text-muted mb-4" style="font-size:14px;" id="error-msg"></p>
      <p class="text-muted" style="font-size:13px;">Go back to your Account page to request the change again.</p>
      <a href="account.html" class="btn btn-outline-secondary">Back to Account</a>
    </div>

  </div>

  <script>
    const token = new URLSearchParams(window.location.search).get('token');

    if (!token) {
      show('error');
      document.getElementById('error-msg').textContent = 'No confirmation token found in this link.';
    } else {
      fetch(`/api/auth/confirm-email-change?token=${encodeURIComponent(token)}`)
        .then(r => r.json().then(d => ({ ok: r.ok, ...d })))
        .then(data => {
          if (data.ok) {
            show('success');
            document.getElementById('new-email').textContent = data.email;
          } else {
            show('error');
            document.getElementById('error-msg').textContent =
              data.error || 'This confirmation link is invalid or has already been used.';
          }
        })
        .catch(() => {
          show('error');
          document.getElementById('error-msg').textContent = 'Could not connect to the server. Please try again.';
        });
    }

    function show(view) {
      document.getElementById('view-loading').style.display = 'none';
      document.getElementById('view-success').style.display = view === 'success' ? '' : 'none';
      document.getElementById('view-error').style.display   = view === 'error'   ? '' : 'none';
    }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
