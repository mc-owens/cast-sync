<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up — CastSync</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">CastSync</a>
    </div>
  </nav>

  <div class="container" style="max-width: 420px; margin-top: 80px;">
    <h4 class="mb-4 fw-semibold">Create Account</h4>

    <div id="error-msg" class="alert alert-danger d-none"></div>

    <form id="signup-form">
      <div class="mb-3">
        <label for="email" class="form-label">Email</label>
        <input type="email" class="form-control" id="email" required />
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input type="password" class="form-control" id="password" required />
        <div class="form-text">At least 6 characters.</div>
      </div>
      <div class="mb-3">
        <label for="master-code" class="form-label">
          Master Code <span class="text-muted">(leave blank if you are an auditionee)</span>
        </label>
        <input type="password" class="form-control" id="master-code"
               placeholder="Directors/choreographers only" />
      </div>
      <button type="submit" class="btn btn-primary w-100">Sign Up</button>
    </form>

    <div class="d-flex align-items-center my-3 gap-2">
      <hr class="flex-grow-1 m-0"><span class="text-muted" style="font-size:13px;">or</span><hr class="flex-grow-1 m-0">
    </div>

    <a href="/auth/google" class="btn btn-outline-secondary w-100 d-flex align-items-center justify-content-center gap-2">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Continue with Google
    </a>
    <p class="text-muted text-center" style="font-size:12px;margin-top:6px;">Google sign-up creates an auditionee account.</p>

    <p class="mt-2 text-center" style="font-size:14px;">
      Already have an account? <a href="login.html">Log in</a>
    </p>
  </div>

  <script>
    document.getElementById('signup-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorEl = document.getElementById('error-msg');
      errorEl.classList.add('d-none');

      const email      = document.getElementById('email').value;
      const password   = document.getElementById('password').value;
      const masterCode = document.getElementById('master-code').value;

      try {
        const res  = await fetch('/api/auth/signup', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ email, password, masterCode }),
        });
        const data = await res.json();

        if (!res.ok) {
          errorEl.textContent = data.error;
          errorEl.classList.remove('d-none');
          return;
        }

        // Redirect based on the role the server assigned
        if (data.role === 'master')     window.location.href = 'master.html';
        if (data.role === 'auditionee') window.location.href = 'auditionForm.html';

      } catch (err) {
        errorEl.textContent = 'Could not connect to the server.';
        errorEl.classList.remove('d-none');
      }
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
