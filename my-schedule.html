<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Schedule | CastSync</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    /* ── Next Rehearsal card ─────────────────────────────────── */
    .next-card {
      background: #111; color: #fff;
      border-radius: 10px; padding: 20px 22px; margin-bottom: 28px;
    }
    .next-card-eyebrow {
      font-size: 11px; font-weight: 700; letter-spacing: .8px;
      text-transform: uppercase; color: #555; margin-bottom: 10px;
    }
    .next-card-date { font-size: 20px; font-weight: 700; line-height: 1.2; }
    .next-card-time { font-size: 14px; color: #aaa; font-weight: 500; margin-top: 3px; }
    .next-card-sep { border: none; border-top: 1px solid #222; margin: 14px 0; }
    .next-card-row { display: flex; align-items: flex-start; gap: 10px; }
    .next-card-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
    .next-card-piece { font-size: 14px; font-weight: 600; color: #eee; }
    .next-card-sub { font-size: 12px; color: #555; margin-top: 2px; line-height: 1.5; }

    .no-next-msg { font-size: 14px; color: #999; margin-bottom: 28px; }

    /* ── Conflict banner ─────────────────────────────────────── */
    .conflict-banner {
      background: #fef2f2; border: 1px solid #fecaca;
      border-radius: 8px; padding: 14px 16px; margin-bottom: 24px;
    }
    .conflict-title { font-size: 13px; font-weight: 700; color: #dc2626; margin-bottom: 6px; }
    .conflict-item { font-size: 13px; color: #991b1b; line-height: 1.5; margin-bottom: 2px; }

    /* ── Week headings ───────────────────────────────────────── */
    .week-heading {
      display: flex; align-items: baseline; gap: 10px;
      font-size: 15px; font-weight: 700; color: #111;
      margin: 32px 0 12px;
    }
    .week-heading:first-child { margin-top: 0; }
    .week-heading-range { font-size: 13px; font-weight: 400; color: #bbb; }

    /* ── Rehearsal card ──────────────────────────────────────── */
    .r-card {
      display: flex; border: 1px solid #e8e8e8; border-radius: 8px;
      overflow: hidden; margin-bottom: 8px; background: #fff;
    }
    .r-card.has-conflict { border-color: #fca5a5; background: #fff8f8; }
    .r-bar { width: 4px; flex-shrink: 0; }
    .r-body { padding: 12px 14px; flex: 1; min-width: 0; }
    .r-prod {
      font-size: 10px; font-weight: 700; color: #bbb;
      text-transform: uppercase; letter-spacing: .6px; margin-bottom: 2px;
    }
    .r-piece { font-size: 15px; font-weight: 700; color: #111; margin-bottom: 4px; }
    .r-time { font-size: 13px; font-weight: 600; color: #333; }
    .r-room { font-size: 13px; color: #999; margin-top: 3px; }
    .r-note { font-size: 12px; color: #b45309; margin-top: 4px; font-style: italic; }
    .r-conflict { font-size: 12px; color: #dc2626; font-weight: 600; margin-top: 6px; }

    .week-empty { font-size: 13px; color: #ccc; font-style: italic; padding: 2px 0 12px; }
  </style>

  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">

<body style="visibility:hidden">

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item"><a class="nav-link" href="auditionForm.html">Audition Form</a></li>

          <li class="nav-item" id="my-schedule-nav-item"><a class="nav-link active" href="my-schedule.html">My Schedule</a></li>
          <li class="nav-item"><a class="nav-link" href="request-absence.html">Request Absence</a></li>
          <li class="nav-item"><a class="nav-link" href="upgrade.html">Director Access</a></li>
          <li class="nav-item d-flex align-items-center d-none" id="switch-director-item">
            <button class="btn btn-outline-secondary btn-sm ms-1" id="switch-mode-btn" style="font-size:12px;">Switch to Director</button>
          </li>

  <div class="container mt-4" style="max-width:620px;">
    <h5 class="mb-4 fw-semibold">My Schedule</h5>
    <div id="schedule-loading" class="text-muted" style="font-size:14px;">Loading your schedule...</div>
    <div id="schedule-content" class="d-none">
      <div id="next-section"></div>
      <div id="conflict-section"></div>
      <div id="weeks-section"></div>
    </div>
    <div id="schedule-unavailable" class="d-none text-muted" style="font-size:14px;margin-top:48px;text-align:center;">
      <p>My Schedule is not yet enabled for your production.</p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    function escapeHtml(s) {
      return String(s == null ? '' : s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    const MONTHS      = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const MONTHS_FULL = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    const DAYS_FULL   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

    function parseDate(iso) {
      const [y, m, d] = iso.split('-').map(Number);
      return new Date(y, m - 1, d);
    }
    function toIso(d) {
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }
    function addDays(d, n) { const r = new Date(d); r.setDate(r.getDate() + n); return r; }
    function weekMonday(date) {
      const day = date.getDay();
      return addDays(date, day === 0 ? -6 : 1 - day);
    }
    function fmtWeekRange(wStart, wEnd) {
      const sm = MONTHS[wStart.getMonth()], sd = wStart.getDate();
      const em = MONTHS[wEnd.getMonth()],   ed = wEnd.getDate();
      return sm === em ? `${sm} ${sd}–${ed}` : `${sm} ${sd} – ${em} ${ed}`;
    }
    function fmtFullDate(iso) {
      const d = parseDate(iso);
      return `${DAYS_FULL[d.getDay()]}, ${MONTHS_FULL[d.getMonth()]} ${d.getDate()}`;
    }
    function parseMinutes(t) {
      if (!t) return null;
      const m = String(t).trim().match(/^(\d+):(\d{2})\s*(AM|PM)$/i);
      if (!m) return null;
      let h = parseInt(m[1], 10);
      const min = parseInt(m[2], 10);
      if (m[3].toUpperCase() === 'PM' && h !== 12) h += 12;
      if (m[3].toUpperCase() === 'AM' && h === 12) h = 0;
      return h * 60 + min;
    }
    function timesOverlap(s1, e1, s2, e2) {
      const a = parseMinutes(s1), b = parseMinutes(e1);
      const c = parseMinutes(s2), d = parseMinutes(e2);
      if (a === null || b === null || c === null || d === null) return false;
      return a < d && c < b;
    }

    const SE_COLORS = {
      tech:'#2c3e50', dress:'#8e44ad', spacing:'#16a085', photo_dress:'#e91e63',
      performance:'#c0392b', warm_up:'#e67e22', costume_fitting:'#2980b9',
      company_meeting:'#0369a1', no_rehearsal:'#64748b', notes_cleaning:'#0d9488',
      load_in_strike:'#b45309', other:'#7f8c8d',
    };
    const SE_LABELS = {
      tech:'Tech Rehearsal', dress:'Dress Rehearsal', spacing:'Spacing Rehearsal',
      photo_dress:'Photo Dress', performance:'Performance', warm_up:'Warm Up',
      costume_fitting:'Costume Fitting', company_meeting:'Company Meeting',
      no_rehearsal:'No Rehearsal / Day Off', notes_cleaning:'Notes / Cleaning',
      load_in_strike:'Load-In / Strike', other:'Other',
    };
    function fmt24h(str) {
      if (!str) return '';
      const [h, m] = str.split(':').map(Number);
      const ap = h >= 12 ? 'PM' : 'AM';
      return `${h % 12 || 12}:${String(m).padStart(2,'0')} ${ap}`;
    }

    function renderCard(r, isConflict, conflictNote) {
      if (r._isSpecialEvent) {
        const color  = SE_COLORS[r.event_type] || SE_COLORS.other;
        const label  = SE_LABELS[r.event_type] || 'Event';
        const times  = [fmt24h(r.start_time), fmt24h(r.end_time)].filter(Boolean).join(' - ');
        return `
          <div class="r-card">
            <div class="r-bar" style="background:${escapeHtml(color)};"></div>
            <div class="r-body">
              <div class="r-prod" style="color:${escapeHtml(color)};font-weight:700;">${escapeHtml(label)}</div>
              <div class="r-piece">${escapeHtml(r.title)}</div>
              ${times ? `<div class="r-time">${escapeHtml(times)}</div>` : ''}
              ${r.location ? `<div class="r-room">${escapeHtml(r.location)}</div>` : ''}
              ${r.notes    ? `<div class="r-note">${escapeHtml(r.notes)}</div>`    : ''}
            </div>
          </div>`;
      }
      const color = r.piece.color || '#ccc';
      const room  = [r.room_name, r.piece.choreographer_name].filter(Boolean).join(' · ');
      return `
        <div class="r-card${isConflict ? ' has-conflict' : ''}">
          <div class="r-bar" style="background:${escapeHtml(color)};"></div>
          <div class="r-body">
            <div class="r-prod">${escapeHtml(r.production_name)}</div>
            <div class="r-piece">${escapeHtml(r.piece.name || 'Rehearsal')}</div>
            <div class="r-time">${escapeHtml(r.start_time)} &ndash; ${escapeHtml(r.end_time)}</div>
            ${room  ? `<div class="r-room">${escapeHtml(room)}</div>` : ''}
            ${r.note ? `<div class="r-note">${escapeHtml(r.note)}</div>` : ''}
            ${isConflict ? `<div class="r-conflict">&#9888; ${escapeHtml(conflictNote || 'Scheduling conflict')}</div>` : ''}
          </div>
        </div>`;
    }

    function renderWeekBlock(label, isThisWeek, weekRehearsals, conflictIndices, conflictNotes) {
      const heading = isThisWeek
        ? `<div class="week-heading">This Week <span class="week-heading-range">${label}</span></div>`
        : `<div class="week-heading"><span class="week-heading-range">${label}</span></div>`;

      if (weekRehearsals.length === 0) {
        return heading + `<p class="week-empty">No rehearsals or events scheduled for you this week.</p>`;
      }

      const cards = weekRehearsals.map(({ r, idx }) =>
        renderCard(r, conflictIndices.has(idx), conflictNotes.get(idx))
      ).join('');
      return heading + cards;
    }

    (async () => {
      try {
        const res  = await fetch('/api/auth/me');
        const user = await res.json();
        if (!res.ok) { window.location.href = 'login.html'; return; }
        if (user.mode === 'director' || (user.role === 'master' && user.mode !== 'auditionee')) {
          window.location.href = 'org-select.html'; return;
        }
        if (user.mode === 'staff') { window.location.href = 'staff-pieces.html'; return; }

        document.getElementById('right-nav').className = 'app-nav-right';
        document.getElementById('right-nav').innerHTML =
          `<a href="account.html">Account</a>
           <button id="logout-btn">Log Out</button>`;
        document.getElementById('logout-btn').addEventListener('click', async () => {
          await fetch('/api/auth/logout', { method: 'POST' });
          window.location.href = 'login.html';
        });
        if (user.isDirector) {
          document.getElementById('switch-director-item').classList.remove('d-none');
          document.getElementById('switch-mode-btn').addEventListener('click', async () => {
            await fetch('/api/auth/switch-mode', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ mode:'director' }) });
            window.location.href = 'org-select.html';
          });
        }
        if (user.isStaff) {
          document.getElementById('switch-staff-item').classList.remove('d-none');
          document.getElementById('switch-staff-btn').addEventListener('click', async () => {
            await fetch('/api/auth/switch-mode', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ mode:'staff' }) });
            window.location.href = 'staff-pieces.html';
          });
        }
        document.body.style.visibility = 'visible';

        const [schedRes, seRes] = await Promise.all([
          fetch('/api/my-schedule'),
          fetch('/api/my-schedule/special-events'),
        ]);
        const data = await schedRes.json();
        document.getElementById('schedule-loading').style.display = 'none';

        if (!schedRes.ok || !data.available) {
          document.getElementById('schedule-unavailable').classList.remove('d-none');
          return;
        }

        // ── Flatten all rehearsals across productions ──────────────────────
        const flat = [];
        for (const prod of (data.productions || [])) {
          for (const r of prod.rehearsals) {
            flat.push({
              ...r,
              production_name: prod.season_name,
              piece: prod.pieces[r.piece_id] || {},
              season_id: prod.season_id,
            });
          }
        }

        // ── Merge in special events ────────────────────────────────────────
        const specialEvents = seRes.ok ? await seRes.json() : [];

        // Suppress rehearsals on days marked No Rehearsal / Day Off (per production)
        const dayOffKeys = new Set(
          specialEvents.filter(e => e.event_type === 'no_rehearsal').map(e => `${e.season_id}:${e.date}`)
        );
        if (dayOffKeys.size > 0) {
          flat.splice(0, flat.length, ...flat.filter(r => !dayOffKeys.has(`${r.season_id}:${r.date}`)));
        }
        specialEvents.forEach(ev => {
          flat.push({ ...ev, _isSpecialEvent: true, start_time: ev.start_time || null, end_time: ev.end_time || null });
        });

        function parse24hMinutes(t) {
          if (!t) return null;
          const [h, m] = t.split(':').map(Number);
          return h * 60 + (m || 0);
        }

        flat.sort((a, b) => {
          if (a.date !== b.date) return a.date.localeCompare(b.date);
          const ta = a._isSpecialEvent ? (parse24hMinutes(a.start_time) ?? 0) : (parseMinutes(a.start_time) ?? 0);
          const tb = b._isSpecialEvent ? (parse24hMinutes(b.start_time) ?? 0) : (parseMinutes(b.start_time) ?? 0);
          return ta - tb;
        });

        // ── Conflict detection ─────────────────────────────────────────────
        const conflictIndices = new Set();
        const conflictNotes   = new Map();
        const conflictBannerItems = [];

        const byDate = {};
        flat.forEach((r, i) => {
          if (!byDate[r.date]) byDate[r.date] = [];
          byDate[r.date].push({ r, i });
        });
        for (const items of Object.values(byDate)) {
          for (let x = 0; x < items.length; x++) {
            for (let y = x + 1; y < items.length; y++) {
              const { r: a, i: ai } = items[x];
              const { r: b, i: bi } = items[y];
              if (a._isSpecialEvent || b._isSpecialEvent) continue;
              if (!timesOverlap(a.start_time, a.end_time, b.start_time, b.end_time)) continue;
              conflictIndices.add(ai);
              conflictIndices.add(bi);
              const aName = `${a.piece.name || 'Rehearsal'} (${a.production_name})`;
              const bName = `${b.piece.name || 'Rehearsal'} (${b.production_name})`;
              if (!conflictNotes.has(ai)) conflictNotes.set(ai, `Overlaps with ${bName}`);
              if (!conflictNotes.has(bi)) conflictNotes.set(bi, `Overlaps with ${aName}`);
              conflictBannerItems.push(
                `${aName} overlaps with ${bName} on ${fmtFullDate(a.date)}`
              );
            }
          }
        }

        // ── Date ranges ────────────────────────────────────────────────────
        const today      = new Date(); today.setHours(0,0,0,0);
        const todayIso   = toIso(today);
        const thisMonday = weekMonday(today);
        const thisSunday = addDays(thisMonday, 6);
        const nextMonday = addDays(thisMonday, 7);

        // Max end_date across all productions (for bounding Upcoming Weeks)
        let maxEndDate = new Date(today);
        for (const prod of (data.productions || [])) {
          if (prod.end_date) {
            const d = parseDate(prod.end_date);
            if (d > maxEndDate) maxEndDate = d;
          }
        }

        // ── Next Rehearsal card ────────────────────────────────────────────
        const nextEl = document.getElementById('next-section');
        const upcoming = flat.filter(r => r.date >= todayIso && !r._isSpecialEvent);
        if (upcoming.length === 0) {
          nextEl.innerHTML = `<p class="no-next-msg">No upcoming rehearsals scheduled.</p>`;
        } else {
          const nr     = upcoming[0];
          const color  = nr.piece.color || '#ccc';
          const sub    = [nr.production_name, nr.room_name, nr.piece.choreographer_name].filter(Boolean).join(' · ');
          nextEl.innerHTML = `
            <div class="next-card">
              <div class="next-card-eyebrow">Next Rehearsal</div>
              <div class="next-card-date">${escapeHtml(fmtFullDate(nr.date))}</div>
              <div class="next-card-time">${escapeHtml(nr.start_time)} &ndash; ${escapeHtml(nr.end_time)}</div>
              <hr class="next-card-sep">
              <div class="next-card-row">
                <div class="next-card-dot" style="background:${escapeHtml(color)};"></div>
                <div>
                  <div class="next-card-piece">${escapeHtml(nr.piece.name || 'Rehearsal')}</div>
                  ${sub ? `<div class="next-card-sub">${escapeHtml(sub)}</div>` : ''}
                </div>
              </div>
            </div>`;
        }

        // ── Conflict banner ────────────────────────────────────────────────
        if (conflictBannerItems.length > 0) {
          document.getElementById('conflict-section').innerHTML = `
            <div class="conflict-banner">
              <div class="conflict-title">&#9888; Scheduling Conflict${conflictBannerItems.length > 1 ? 's' : ''} Detected</div>
              ${conflictBannerItems.map(c => `<div class="conflict-item">${escapeHtml(c)}</div>`).join('')}
            </div>`;
        }

        // ── Week sections ──────────────────────────────────────────────────
        const weeksEl = document.getElementById('weeks-section');
        let weeksHtml = '';

        // This Week
        const thisWeekItems = flat
          .map((r, i) => ({ r, i }))
          .filter(({ r }) => r.date >= toIso(thisMonday) && r.date <= toIso(thisSunday));
        weeksHtml += renderWeekBlock(
          fmtWeekRange(thisMonday, thisSunday),
          true, thisWeekItems, conflictIndices, conflictNotes
        );

        // Upcoming weeks (next Monday onwards through max end_date)
        if (nextMonday <= maxEndDate) {
          let wStart = new Date(nextMonday);
          while (wStart <= maxEndDate) {
            const wEnd   = addDays(wStart, 6);
            const wLabel = fmtWeekRange(wStart, wEnd);
            const wIsoStart = toIso(wStart);
            const wIsoEnd   = toIso(wEnd);
            const wItems = flat
              .map((r, i) => ({ r, i }))
              .filter(({ r }) => r.date >= wIsoStart && r.date <= wIsoEnd);
            weeksHtml += renderWeekBlock(wLabel, false, wItems, conflictIndices, conflictNotes);
            wStart = addDays(wStart, 7);
          }
        }

        weeksEl.innerHTML = weeksHtml;
        document.getElementById('schedule-content').classList.remove('d-none');

      } catch (err) {
        window.location.href = 'login.html';
      }
    })();
  </script>

</body>
