<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Production Notes | CastSync</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="app-shell.css">
  <style>
    .note-card { border: 1px solid #e0e0e0; border-radius: 8px; padding: 12px 16px; margin-bottom: 10px; background: #fff; }
    .note-meta { font-size: 12px; color: #888; }
    .note-text { font-size: 14px; white-space: pre-wrap; margin: 6px 0; }
  </style>
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>
<body style="visibility:hidden">

  <div id="app-shell-root"></div>
  <script src="app-shell-staff.js"></script>

  <div class="app-main">
    <div class="container-fluid mt-4 px-4" style="max-width:760px;">

      <div class="mb-3">
        <h5 class="mb-0 fw-semibold">Production Notes</h5>
        <p class="text-muted mb-0" style="font-size:13px;">Notes for the pieces you're assigned to. Only visible to people with access to that piece.</p>
      </div>

      <div class="mb-3">
        <select id="piece-select" class="form-select form-select-sm" style="max-width:320px;"></select>
      </div>

      <!-- Add note form -->
      <div class="border rounded p-3 mb-4" style="background:#fafafa;">
        <textarea id="note-text" class="form-control mb-2" rows="3" placeholder="Write a note…"></textarea>
        <div class="mb-2" style="max-width:200px;">
          <label class="form-label mb-1" style="font-size:12px;color:#666;">Category</label>
          <select id="note-category" class="form-select form-select-sm">
            <option value="general">General</option>
            <option value="absence">Absence</option>
            <option value="injury">Injury</option>
            <option value="attendance">Attendance</option>
            <option value="casting">Casting</option>
          </select>
        </div>
        <button id="add-note-btn" class="btn btn-dark btn-sm mt-1">Add Note</button>
        <span id="note-error" class="text-danger ms-2 d-none" style="font-size:13px;"></span>
      </div>

      <div id="notes-loading" class="text-muted" style="font-size:14px;">Loading…</div>
      <div id="notes-list"></div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    const CATEGORY_LABELS = { absence: 'Absence', injury: 'Injury', attendance: 'Attendance', casting: 'Casting', general: 'General' };

    function escapeHtml(s) {
      return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function formatDate(iso) {
      const d = new Date(iso);
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) +
             ' · ' + d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
    }

    const pieceSelect = document.getElementById('piece-select');

    async function loadPieces() {
      try {
        const res = await fetch('/api/staff/pieces');
        if (!res.ok) return false;
        const pieces = await res.json();
        if (pieces.length === 0) {
          pieceSelect.innerHTML = '<option value="">No pieces yet</option>';
          return false;
        }
        const params = new URLSearchParams(window.location.search);
        const wantedId = params.get('piece') ? parseInt(params.get('piece')) : null;
        const defaultPiece = (wantedId && pieces.find(p => p.piece_id === wantedId)) || pieces[0];

        pieceSelect.innerHTML = pieces.map(p =>
          `<option value="${p.piece_id}" ${p.piece_id === defaultPiece.piece_id ? 'selected' : ''}>${escapeHtml(p.piece_name)} (${escapeHtml(p.season_name)})</option>`
        ).join('');
        return true;
      } catch (e) { return false; }
    }

    function renderNotes(notes) {
      const list = document.getElementById('notes-list');
      if (notes.length === 0) {
        list.innerHTML = '<p class="text-muted" style="font-size:13px;">No notes yet.</p>';
        return;
      }
      list.innerHTML = notes.map(n => `
        <div class="note-card">
          <div class="d-flex justify-content-between align-items-start">
            <span class="badge text-bg-secondary">${CATEGORY_LABELS[n.category] || 'General'}</span>
            <span class="note-meta">${formatDate(n.created_at)}</span>
          </div>
          <div class="note-text">${escapeHtml(n.note_text)}</div>
          <div class="note-meta">Posted by ${escapeHtml(n.author_email || 'Unknown')}</div>
        </div>`).join('');
    }

    async function loadNotes() {
      const pieceId = pieceSelect.value;
      if (!pieceId) { document.getElementById('notes-loading').textContent = 'No pieces yet.'; return; }
      document.getElementById('notes-loading').style.display = '';
      document.getElementById('notes-loading').textContent = 'Loading…';
      document.getElementById('notes-list').innerHTML = '';
      try {
        const res = await fetch(`/api/staff/pieces/${pieceId}/notes`);
        if (!res.ok) throw new Error();
        const notes = await res.json();
        document.getElementById('notes-loading').style.display = 'none';
        renderNotes(notes);
      } catch (err) {
        document.getElementById('notes-loading').textContent = 'Could not load notes.';
      }
    }

    pieceSelect.addEventListener('change', loadNotes);

    document.getElementById('add-note-btn').addEventListener('click', async () => {
      const noteText = document.getElementById('note-text').value.trim();
      const errEl    = document.getElementById('note-error');
      errEl.classList.add('d-none');
      if (!noteText) { errEl.textContent = 'Note text is required.'; errEl.classList.remove('d-none'); return; }
      const pieceId = pieceSelect.value;
      if (!pieceId) { errEl.textContent = 'Select a piece first.'; errEl.classList.remove('d-none'); return; }

      const category = document.getElementById('note-category').value;
      const btn = document.getElementById('add-note-btn');
      btn.disabled = true;
      try {
        const res = await fetch(`/api/staff/pieces/${pieceId}/notes`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ note_text: noteText, category }),
        });
        if (!res.ok) {
          const data = await res.json().catch(() => ({}));
          errEl.textContent = data.error || 'Could not save note.';
          errEl.classList.remove('d-none');
          return;
        }
        document.getElementById('note-text').value = '';
        document.getElementById('note-category').value = 'general';
        await loadNotes();
      } catch (err) {
        errEl.textContent = 'Could not connect to server.';
        errEl.classList.remove('d-none');
      } finally {
        btn.disabled = false;
      }
    });
  </script>

  <script>
    (async () => {
      try {
        const res  = await fetch('/api/auth/me');
        const user = await res.json();
        if (!res.ok || (!user.isStaff && user.role !== 'staff')) { window.location.href = 'login.html'; return; }
        document.getElementById('right-nav').innerHTML =
          `<a href="account.html">Account</a>` +
          (user.isDirector ? `<button id="switch-director-btn">Switch to Director</button>` : '') +
          `<button id="switch-auditionee-btn">Switch to Auditionee</button>
           <button class="btn-nav-logout" id="logout-btn">Log Out</button>`;
        if (user.isDirector) {
          document.getElementById('switch-director-btn').addEventListener('click', async () => {
            await fetch('/api/auth/switch-mode', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ mode:'director' }) });
            window.location.href = 'org-select.html';
          });
        }
        document.getElementById('switch-auditionee-btn').addEventListener('click', async () => {
          await fetch('/api/auth/switch-mode', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ mode:'auditionee' }) });
          window.location.href = 'auditionForm.html';
        });
        document.getElementById('logout-btn').addEventListener('click', async () => {
          await fetch('/api/auth/logout', { method: 'POST' });
          window.location.href = 'login.html';
        });
        document.body.style.visibility = 'visible';

        const hasPieces = await loadPieces();
        if (hasPieces) {
          loadNotes();
        } else {
          document.getElementById('notes-loading').textContent = "You haven't been assigned to any pieces yet.";
        }
      } catch (err) {
        window.location.href = 'login.html';
      }
    })();
  </script>

  </div>
</body>
</html>
