<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Successful — CastSync</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="logo.png" type="image/png">
</head>
<body style="visibility:hidden">

  <nav class="navbar navbar-expand app-nav">
    <div class="container-fluid">
      <a class="navbar-brand" href="#"><img src="logo-nav.png" width="22" height="22" alt="" style="vertical-align:middle;margin-right:6px;margin-bottom:2px;">CastSync</a>
    </div>
  </nav>

  <div class="container mt-5" style="max-width:480px;text-align:center;">
    <div id="loading-state">
      <div class="spinner-border text-secondary mb-3" role="status"></div>
      <p class="text-muted">Confirming your payment…</p>
    </div>

    <div id="success-state" style="display:none;">
      <div style="font-size:48px;margin-bottom:16px;">🎭</div>
      <h4 class="fw-semibold mb-2">Production Created!</h4>
      <p class="text-muted mb-4" id="success-msg">Your production is ready. Taking you to the master schedule…</p>
      <a href="master.html" class="btn btn-dark">Go to Master Schedule</a>
    </div>

    <div id="error-state" style="display:none;">
      <div style="font-size:48px;margin-bottom:16px;">⚠️</div>
      <h4 class="fw-semibold mb-2">Something went wrong</h4>
      <p class="text-muted mb-4" id="error-msg"></p>
      <a href="org-select.html" class="btn btn-outline-secondary">Back to Productions</a>
    </div>
  </div>

  <script>
    (async () => {
      const params    = new URLSearchParams(window.location.search);
      const sessionId = params.get('session_id');

      document.body.style.visibility = 'visible';

      if (!sessionId) {
        showError('No payment session found.');
        return;
      }

      try {
        const res  = await fetch(`/api/checkout/complete?session_id=${encodeURIComponent(sessionId)}`);
        const data = await res.json();

        if (!res.ok) {
          showError(data.error || 'Could not confirm payment.');
          return;
        }

        document.getElementById('loading-state').style.display = 'none';
        document.getElementById('success-state').style.display = 'block';

        // Redirect automatically after 2 seconds
        setTimeout(() => { window.location.href = 'master.html'; }, 2000);

      } catch (err) {
        showError('Could not connect to server. Try refreshing.');
      }
    })();

    function showError(msg) {
      document.getElementById('loading-state').style.display = 'none';
      document.getElementById('error-msg').textContent       = msg;
      document.getElementById('error-state').style.display  = 'block';
    }
  </script>

</body>
</html>
