<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — CastSync</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="logo.png" type="image/png">
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-TYZB1PQQG9"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-TYZB1PQQG9');</script>
</head>
<body>

  <nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="index.html"><img src="logo-nav.png" width="22" height="22" alt="" style="vertical-align:middle;margin-right:6px;margin-bottom:2px;">CastSync</a>
    </div>
  </nav>

  <div class="container" style="max-width:560px;margin-top:64px;margin-bottom:80px;">
    <h2 class="fw-semibold mb-1">Contact Us</h2>
    <p class="text-muted mb-5" style="font-size:14px;">We typically respond within one business day.</p>

    <div id="form-wrap">
      <div id="success-msg" class="alert alert-success d-none">Message sent — we'll be in touch soon.</div>
      <div id="error-msg" class="alert alert-danger d-none"></div>

      <form id="contact-form">
        <div class="row g-3 mb-3">
          <div class="col-sm-6">
            <label class="form-label">Name</label>
            <input type="text" class="form-control" id="c-name" required placeholder="Your name" />
          </div>
          <div class="col-sm-6">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" id="c-email" required placeholder="you@example.com" />
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label">Subject</label>
          <select class="form-select" id="c-subject">
            <option value="General question">General question</option>
            <option value="Technical issue">Technical issue</option>
            <option value="Billing">Billing</option>
            <option value="Director access code">Director access code request</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="mb-4">
          <label class="form-label">Message</label>
          <textarea class="form-control" id="c-message" rows="5" required placeholder="How can we help?"></textarea>
        </div>
        <button type="submit" class="btn btn-dark w-100" id="send-btn">Send Message</button>
      </form>
    </div>

    <hr class="my-5">

    <div class="d-flex gap-4 flex-wrap">
      <div>
        <div class="text-muted" style="font-size:12px;text-transform:uppercase;letter-spacing:.5px;font-weight:600;">Email</div>
        <a href="mailto:support@cast-sync.com" style="font-size:14px;">support@cast-sync.com</a>
      </div>
      <div>
        <div class="text-muted" style="font-size:12px;text-transform:uppercase;letter-spacing:.5px;font-weight:600;">Response time</div>
        <div style="font-size:14px;">Within 1 business day</div>
      </div>
    </div>
  </div>

  <footer class="border-top py-3 text-center text-muted" style="font-size:12px;">
    &copy; 2026 CastSync &nbsp;·&nbsp;
    <a href="terms.html" class="text-muted">Terms</a> &nbsp;·&nbsp;
    <a href="privacy.html" class="text-muted">Privacy</a> &nbsp;·&nbsp;
    <a href="cookies.html" class="text-muted">Cookies</a> &nbsp;·&nbsp;
    <a href="contact.html" class="text-muted">Contact</a>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.getElementById('contact-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn     = document.getElementById('send-btn');
      const errorEl = document.getElementById('error-msg');
      const successEl = document.getElementById('success-msg');
      errorEl.classList.add('d-none');

      const name    = document.getElementById('c-name').value.trim();
      const email   = document.getElementById('c-email').value.trim();
      const subject = document.getElementById('c-subject').value;
      const message = document.getElementById('c-message').value.trim();

      btn.disabled    = true;
      btn.textContent = 'Sending…';

      try {
        const res  = await fetch('/api/contact', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ name, email, subject, message }),
        });
        const data = await res.json();
        if (!res.ok) {
          errorEl.textContent = data.error || 'Could not send message. Please email us directly.';
          errorEl.classList.remove('d-none');
        } else {
          document.getElementById('contact-form').style.display = 'none';
          successEl.classList.remove('d-none');
        }
      } catch (err) {
        // Fallback: open mailto
        const mailto = `mailto:support@cast-sync.com?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(`Name: ${name}\nEmail: ${email}\n\n${message}`)}`;
        window.location.href = mailto;
      } finally {
        btn.disabled    = false;
        btn.textContent = 'Send Message';
      }
    });
  </script>

</body>
</html>
