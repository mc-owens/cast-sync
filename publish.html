<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Publish Casting — CastSync</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    @media print {
      .no-print { display: none !important; }
      body { visibility: visible !important; }
      #preview-card { border: none !important; box-shadow: none !important; }
    }
    .piece-block { border-top: 1px solid #e0e0e0; padding-top: 16px; margin-bottom: 24px; }
    .cast-name { font-size: 14px; margin: 2px 0; }
  </style>
</head>
<body style="visibility:hidden">

  <!-- Nav -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark no-print">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">CastSync</a>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav">
          <li class="nav-item"><a class="nav-link" href="search.html">Availability</a></li>
          <li class="nav-item"><a class="nav-link" href="master.html">Master Schedule</a></li>
          <li class="nav-item"><a class="nav-link" href="cast.html">Cast Builder</a></li>
          <li class="nav-item"><a class="nav-link" href="casting.html">Casting</a></li>
          <li class="nav-item"><a class="nav-link" href="dancers.html">Auditionees</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container-fluid mt-4 px-4" style="max-width:860px;">

    <!-- Controls -->
    <div class="no-print mb-4">
      <div class="d-flex justify-content-between align-items-start mb-3">
        <div>
          <h5 class="mb-0 fw-semibold">Publish Casting</h5>
          <p class="text-muted mb-0" style="font-size:13px;" id="subtitle">Loading…</p>
        </div>
        <a href="casting.html" class="btn btn-sm btn-outline-secondary">← Back to Casting</a>
      </div>

      <div class="card mb-3">
        <div class="card-body">
          <label class="form-label fw-semibold">Optional Message</label>
          <textarea id="blurb" class="form-control" rows="3"
            placeholder="Add any additional information for your auditionees — rehearsal expectations, required attire, etc."></textarea>
          <div class="form-text">This will appear at the top of the email and printed sheet, below the org name.</div>
        </div>
      </div>

      <div class="d-flex gap-2 flex-wrap mb-2">
        <button id="send-btn" class="btn btn-dark">Send to All Auditionees (<span id="send-count">…</span>)</button>
        <button id="pdf-btn" class="btn btn-outline-secondary" onclick="window.print()">Download PDF</button>
        <button id="csv-btn" class="btn btn-outline-secondary">Download CSV</button>
      </div>
      <div id="send-result" class="mt-2" style="font-size:13px;"></div>
    </div>

    <!-- Preview (also the print target) -->
    <div class="card" id="preview-card">
      <div class="card-body" id="preview-body">
        <div class="text-muted">Loading preview…</div>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    let publishData = null;

    function renderPreview(blurb) {
      if (!publishData) return;
      const { org_name, season_name, pieces } = publishData;

      let html = `<h2 style="text-align:center;margin-bottom:4px;">${org_name}</h2>`;
      html += `<p style="text-align:center;color:#555;margin-top:0;margin-bottom:${blurb ? '16px' : '8px'};">${season_name}</p>`;

      if (blurb) {
        html += `<p style="border-left:3px solid #ccc;padding:6px 12px;color:#333;margin-bottom:20px;font-size:14px;">${blurb.replace(/\n/g,'<br>')}</p>`;
      }

      if (pieces.length === 0) {
        html += '<p class="text-muted">No pieces added to the schedule yet.</p>';
      }

      pieces.forEach(p => {
        const blocks      = p.blocks || [];
        const casts       = p.casts  || [];
        const members     = casts.filter(c => c.cast_role === 'member');
        const understudies = casts.filter(c => c.cast_role === 'understudy');
        const rehearsalStr = blocks.length
          ? blocks.map(b => `${b.day} ${b.start_time}–${b.end_time}`).join(', ')
          : '<em style="color:#888;">TBD</em>';

        html += `<div class="piece-block">`;
        if (p.choreographer_name) {
          html += `<h5 style="margin-bottom:2px;">${p.choreographer_name}</h5>`;
          if (p.choreographer_email) html += `<p style="font-size:13px;color:#555;margin-bottom:6px;">${p.choreographer_email}</p>`;
        } else {
          html += `<h5 style="margin-bottom:6px;color:#aaa;font-style:italic;">No choreographer listed</h5>`;
        }
        html += `<p style="font-size:13px;color:#555;margin-bottom:10px;">Rehearsals: ${rehearsalStr}</p>`;

        if (members.length === 0 && understudies.length === 0) {
          html += `<p style="font-size:13px;color:#aaa;font-style:italic;">No cast assigned yet.</p>`;
        } else {
          members.forEach(c => {
            html += `<p class="cast-name">${c.first_name} ${c.last_name}</p>`;
          });
          understudies.forEach(c => {
            html += `<p class="cast-name">${c.first_name} ${c.last_name} <span style="color:#888;font-size:12px;">(understudy)</span></p>`;
          });
        }
        html += `</div>`;
      });

      document.getElementById('preview-body').innerHTML = html;
    }

    // Live preview update as director types blurb
    document.getElementById('blurb').addEventListener('input', function () {
      renderPreview(this.value.trim());
    });

    // Send button
    document.getElementById('send-btn').addEventListener('click', async () => {
      const btn      = document.getElementById('send-btn');
      const resultEl = document.getElementById('send-result');
      const blurb    = document.getElementById('blurb').value.trim();
      btn.disabled   = true;
      btn.textContent = 'Sending…';
      resultEl.textContent = '';
      resultEl.className = '';
      try {
        const res  = await fetch('/api/publish/send', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ blurb }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        resultEl.textContent = `✓ ${data.message}`;
        resultEl.className   = 'text-success';
      } catch (err) {
        resultEl.textContent = `Error: ${err.message}`;
        resultEl.className   = 'text-danger';
      } finally {
        btn.disabled    = false;
        btn.innerHTML   = `Send to All Auditionees (<span id="send-count">${publishData?.auditionee_count ?? '…'}</span>)`;
      }
    });

    // CSV export
    document.getElementById('csv-btn').addEventListener('click', () => {
      if (!publishData) return;
      const { org_name, season_name, pieces } = publishData;
      const rows = [['Org','Season','Piece','Choreographer','Choreo Email','Rehearsals','First Name','Last Name','Role']];
      pieces.forEach(p => {
        const rehearsalStr = (p.blocks||[]).map(b=>`${b.day} ${b.start_time}-${b.end_time}`).join(' | ');
        const casts = p.casts || [];
        if (casts.length === 0) {
          rows.push([org_name, season_name, p.name, p.choreographer_name||'', p.choreographer_email||'', rehearsalStr, '', '', '']);
        } else {
          casts.forEach(c => {
            rows.push([org_name, season_name, p.name, p.choreographer_name||'', p.choreographer_email||'', rehearsalStr, c.first_name, c.last_name, c.cast_role]);
          });
        }
      });
      const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
      const blob = new Blob([csv], { type: 'text/csv' });
      const a    = document.createElement('a');
      a.href     = URL.createObjectURL(blob);
      a.download = `${org_name.replace(/\s+/g,'_')}_casting.csv`;
      a.click();
    });

    // Load data
    async function loadPublishData() {
      try {
        const res  = await fetch('/api/publish');
        publishData = await res.json();
        document.getElementById('subtitle').textContent =
          `${publishData.org_name} · ${publishData.season_name}`;
        document.getElementById('send-count').textContent = publishData.auditionee_count;
        renderPreview('');
      } catch (err) {
        document.getElementById('preview-body').textContent = 'Could not load casting data.';
      }
    }

    loadPublishData();
  </script>

  <script>
    (async () => {
      try {
        const res  = await fetch('/api/auth/me');
        const user = await res.json();
        if (!res.ok || (user.role !== 'master' && user.mode !== 'director')) { window.location.href = 'login.html'; return; }
        if (!user.orgId) { window.location.href = 'org-select.html'; return; }
        const nav = document.querySelector('.navbar-nav');
        nav.insertAdjacentHTML('beforeend',
          `<li class="nav-item"><span class="nav-link text-white-50" style="font-size:12px;">${user.orgName} · ${user.seasonName}</span></li>
           <li class="nav-item"><span class="nav-link text-white-50">${user.email}</span></li>
           <li class="nav-item"><button class="btn btn-link nav-link text-white" id="logout-btn">Log Out</button></li>`
        );
        document.getElementById('logout-btn').addEventListener('click', async () => {
          await fetch('/api/auth/logout', { method: 'POST' });
          window.location.href = 'login.html';
        });
        document.body.style.visibility = 'visible';
      } catch (err) { window.location.href = 'login.html'; }
    })();
  </script>

</body>
</html>
