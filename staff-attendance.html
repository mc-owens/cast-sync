<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Attendance | CastSync</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="app-shell.css">
  <style>
    .attendance-row { display: flex; align-items: center; gap: 14px; padding: 10px 0; border-bottom: 1px solid #f0f0f0; }
    .attendance-row:last-child { border-bottom: none; }
    .attendance-name { flex: 1; font-size: 14px; }
    .row-saved { font-size: 12px; white-space: nowrap; }
  </style>
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>
<body style="visibility:hidden">

  <div id="app-shell-root"></div>
  <script src="app-shell-staff.js"></script>

  <div class="app-main">
    <div class="container-fluid mt-4 px-4" style="max-width:820px;">

      <div class="mb-3">
        <h5 class="mb-0 fw-semibold">Attendance</h5>
        <p class="text-muted mb-0" style="font-size:13px;">Track who showed up to rehearsal, for the pieces you're assigned to.</p>
      </div>

      <div class="d-flex align-items-center gap-2 mb-3 flex-wrap">
        <select id="piece-select" class="form-select form-select-sm" style="width:220px;"></select>
        <button id="prev-day-btn" class="btn btn-sm btn-outline-secondary">&lsaquo;</button>
        <input type="date" id="attendance-date" class="form-control form-control-sm" style="width:160px;">
        <button id="next-day-btn" class="btn btn-sm btn-outline-secondary">&rsaquo;</button>
        <button id="today-btn" class="btn btn-sm btn-outline-secondary">Today</button>
      </div>

      <div id="attendance-loading" class="text-muted" style="font-size:14px;">Loading…</div>
      <div id="attendance-list"></div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    const STATUS_LABELS = { none: 'None', injured: 'Injured', illness: 'Illness', other: 'Other' };

    function escapeHtml(s) {
      return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function todayStr() {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }

    function shiftDate(dateStr, days) {
      const d = new Date(`${dateStr}T00:00:00`);
      d.setDate(d.getDate() + days);
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }

    const dateInput   = document.getElementById('attendance-date');
    const pieceSelect = document.getElementById('piece-select');
    dateInput.value = todayStr();

    async function loadPieces() {
      try {
        const res = await fetch('/api/staff/pieces');
        if (!res.ok) return false;
        const pieces = await res.json();
        if (pieces.length === 0) {
          pieceSelect.innerHTML = '<option value="">No pieces yet</option>';
          return false;
        }
        const params = new URLSearchParams(window.location.search);
        const wantedId = params.get('piece') ? parseInt(params.get('piece')) : null;
        const defaultPiece = (wantedId && pieces.find(p => p.piece_id === wantedId)) || pieces[0];

        pieceSelect.innerHTML = pieces.map(p =>
          `<option value="${p.piece_id}" ${p.piece_id === defaultPiece.piece_id ? 'selected' : ''}>${escapeHtml(p.piece_name)} (${escapeHtml(p.season_name)})</option>`
        ).join('');
        return true;
      } catch (e) { return false; }
    }

    function renderRow(d) {
      const row = document.createElement('div');
      row.className = 'attendance-row';
      row.dataset.userId = d.user_id;
      row.innerHTML = `
        <div class="attendance-name">${escapeHtml(d.first_name)} ${escapeHtml(d.last_name)}</div>
        <div class="form-check form-switch mb-0">
          <input class="form-check-input present-toggle" type="checkbox" role="switch" ${d.present ? 'checked' : ''}>
          <label class="form-check-label present-label" style="font-size:13px;width:58px;display:inline-block;">${d.present ? 'Present' : 'Absent'}</label>
        </div>
        <select class="form-select form-select-sm status-select" style="width:110px;">
          ${Object.entries(STATUS_LABELS).map(([val, label]) => `<option value="${val}" ${d.status === val ? 'selected' : ''}>${label}</option>`).join('')}
        </select>
        <input type="text" class="form-control form-control-sm other-note ${d.status === 'other' ? '' : 'd-none'}"
               style="width:170px;" placeholder="Specify…" value="${escapeHtml(d.status_note || '')}">
        <span class="row-saved text-success d-none">Saved</span>
      `;
      return row;
    }

    async function saveRow(row) {
      const userId     = row.dataset.userId;
      const present    = row.querySelector('.present-toggle').checked;
      const status     = row.querySelector('.status-select').value;
      const statusNote = row.querySelector('.other-note').value.trim();
      const savedEl    = row.querySelector('.row-saved');
      try {
        const res = await fetch(`/api/staff/pieces/${pieceSelect.value}/attendance`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ date: dateInput.value, user_id: parseInt(userId), present, status, status_note: statusNote }),
        });
        if (!res.ok) { alert('Could not save attendance for this dancer.'); return; }
        savedEl.classList.remove('d-none');
        setTimeout(() => savedEl.classList.add('d-none'), 1500);
      } catch (err) {
        alert('Could not connect to server.');
      }
    }

    document.getElementById('attendance-list').addEventListener('change', (e) => {
      const row = e.target.closest('.attendance-row');
      if (!row) return;
      if (e.target.classList.contains('present-toggle')) {
        row.querySelector('.present-label').textContent = e.target.checked ? 'Present' : 'Absent';
      }
      if (e.target.classList.contains('status-select')) {
        row.querySelector('.other-note').classList.toggle('d-none', e.target.value !== 'other');
      }
      saveRow(row);
    });

    document.getElementById('attendance-list').addEventListener('blur', (e) => {
      if (!e.target.classList.contains('other-note')) return;
      const row = e.target.closest('.attendance-row');
      if (row) saveRow(row);
    }, true);

    async function loadAttendance() {
      const date    = dateInput.value;
      const pieceId = pieceSelect.value;
      if (!pieceId) { document.getElementById('attendance-loading').textContent = 'No pieces yet.'; return; }
      document.getElementById('attendance-loading').style.display = '';
      document.getElementById('attendance-loading').textContent = 'Loading…';
      document.getElementById('attendance-list').innerHTML = '';
      try {
        const res = await fetch(`/api/staff/pieces/${pieceId}/attendance?date=${encodeURIComponent(date)}`);
        if (!res.ok) throw new Error();
        const data = await res.json();
        document.getElementById('attendance-loading').style.display = 'none';

        const list = document.getElementById('attendance-list');
        if (data.dancers.length === 0) {
          list.innerHTML = '<p class="text-muted" style="font-size:13px;">No one is cast in this piece yet.</p>';
          return;
        }
        data.dancers.forEach(d => list.appendChild(renderRow(d)));
      } catch (err) {
        document.getElementById('attendance-loading').textContent = 'Could not load attendance.';
      }
    }

    document.getElementById('prev-day-btn').addEventListener('click', () => { dateInput.value = shiftDate(dateInput.value, -1); loadAttendance(); });
    document.getElementById('next-day-btn').addEventListener('click', () => { dateInput.value = shiftDate(dateInput.value, 1); loadAttendance(); });
    document.getElementById('today-btn').addEventListener('click', () => { dateInput.value = todayStr(); loadAttendance(); });
    dateInput.addEventListener('change', loadAttendance);
    pieceSelect.addEventListener('change', loadAttendance);
  </script>

  <script>
    (async () => {
      try {
        const res  = await fetch('/api/auth/me');
        const user = await res.json();
        if (!res.ok || (!user.isStaff && user.role !== 'staff')) { window.location.href = 'login.html'; return; }
        document.getElementById('right-nav').innerHTML =
          `<a href="account.html">Account</a>` +
          (user.isDirector ? `<button id="switch-director-btn">Switch to Director</button>` : '') +
          `<button id="switch-auditionee-btn">Switch to Auditionee</button>
           <button class="btn-nav-logout" id="logout-btn">Log Out</button>`;
        if (user.isDirector) {
          document.getElementById('switch-director-btn').addEventListener('click', async () => {
            await fetch('/api/auth/switch-mode', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ mode:'director' }) });
            window.location.href = 'org-select.html';
          });
        }
        document.getElementById('switch-auditionee-btn').addEventListener('click', async () => {
          await fetch('/api/auth/switch-mode', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ mode:'auditionee' }) });
          window.location.href = 'auditionForm.html';
        });
        document.getElementById('logout-btn').addEventListener('click', async () => {
          await fetch('/api/auth/logout', { method: 'POST' });
          window.location.href = 'login.html';
        });
        document.body.style.visibility = 'visible';

        const hasPieces = await loadPieces();
        if (hasPieces) {
          loadAttendance();
        } else {
          document.getElementById('attendance-loading').textContent = "You haven't been assigned to any pieces yet.";
        }
      } catch (err) {
        window.location.href = 'login.html';
      }
    })();
  </script>

  </div>
</body>
</html>
