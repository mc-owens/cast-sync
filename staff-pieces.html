<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Pieces | CastSync</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="app-shell.css">
  <style>
    .staff-piece-card { border: 1px solid #e0e0e0; border-radius: 8px; padding: 14px 16px; margin-bottom: 12px; background: #fff; }
    .staff-piece-org { font-size: 12px; color: #888; margin-bottom: 10px; }
    .staff-title-badge { font-size: 11px; font-weight: 600; color: #555; background: #f0f0f0; border-radius: 10px; padding: 2px 10px; }
    .staff-roster-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #f4f4f4; font-size: 13px; }
    .staff-roster-row:last-child { border-bottom: none; }
  </style>
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>
<body style="visibility:hidden">

  <div id="app-shell-root"></div>
  <script src="app-shell-staff.js"></script>

  <div class="app-main">
    <div class="container-fluid mt-4 px-4" style="max-width:800px;">

      <div class="mb-4">
        <h5 class="mb-0 fw-semibold">My Pieces</h5>
        <p class="text-muted mb-0" style="font-size:13px;">Every piece you've been assigned to, across all productions.</p>
      </div>

      <div id="loading-msg" class="text-muted" style="font-size:14px;">Loading...</div>
      <div id="empty-msg" class="alert alert-info d-none">
        You haven't been assigned to any pieces yet. Once a director adds you to one, it'll show up here.
      </div>
      <div id="pieces-list"></div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    function escapeHtml(s) {
      return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    async function loadPieces() {
      try {
        const res = await fetch('/api/staff/pieces');
        if (!res.ok) throw new Error();
        const pieces = await res.json();
        document.getElementById('loading-msg').style.display = 'none';
        if (pieces.length === 0) {
          document.getElementById('empty-msg').classList.remove('d-none');
          return;
        }

        const byProduction = {};
        pieces.forEach(p => {
          const key = `${p.org_id}-${p.season_id}`;
          if (!byProduction[key]) byProduction[key] = { org_name: p.org_name, season_name: p.season_name, pieces: [] };
          byProduction[key].pieces.push(p);
        });

        const list = document.getElementById('pieces-list');
        Object.values(byProduction).forEach(group => {
          const card = document.createElement('div');
          card.className = 'staff-piece-card';
          card.innerHTML = `
            <div class="staff-piece-org">${escapeHtml(group.org_name)} &middot; ${escapeHtml(group.season_name)}</div>
            ${group.pieces.map(p => `
              <div class="d-flex align-items-center justify-content-between mb-2 pb-2 border-bottom">
                <div class="d-flex align-items-center" style="gap:8px;">
                  <span style="display:inline-block;width:12px;height:12px;border-radius:3px;background:${escapeHtml(p.color || '#999')};flex-shrink:0;"></span>
                  <span class="fw-semibold" style="font-size:14px;">${escapeHtml(p.piece_name)}</span>
                  ${p.display_title ? `<span class="staff-title-badge">${escapeHtml(p.display_title)}</span>` : ''}
                </div>
                <div class="d-flex gap-2">
                  <button class="btn btn-sm btn-outline-secondary view-cast-btn" data-piece-id="${p.piece_id}">Cast List</button>
                  <a class="btn btn-sm btn-outline-dark" href="staff-attendance.html?piece=${p.piece_id}">Attendance</a>
                  <a class="btn btn-sm btn-outline-dark" href="staff-notes.html?piece=${p.piece_id}">Notes</a>
                </div>
              </div>
              <div class="d-none" id="cast-panel-${p.piece_id}" style="font-size:13px;margin:-6px 0 10px 20px;"></div>
            `).join('')}
          `;
          list.appendChild(card);
        });

        list.addEventListener('click', async (e) => {
          const btn = e.target.closest('.view-cast-btn');
          if (!btn) return;
          const pieceId = btn.dataset.pieceId;
          const panel = document.getElementById(`cast-panel-${pieceId}`);
          if (!panel.classList.contains('d-none')) { panel.classList.add('d-none'); return; }
          panel.classList.remove('d-none');
          panel.innerHTML = '<span class="text-muted">Loading…</span>';
          try {
            const castRes = await fetch(`/api/staff/pieces/${pieceId}/cast`);
            const data = await castRes.json();
            if (!castRes.ok) throw new Error(data.error);
            if (data.dancers.length === 0) {
              panel.innerHTML = '<span class="text-muted">No dancers cast yet.</span>';
              return;
            }
            panel.innerHTML = data.dancers.map(d => `
              <div class="staff-roster-row">
                <span>${escapeHtml(d.first_name)} ${escapeHtml(d.last_name)}${d.role_name ? ` &middot; <span class="text-muted">${escapeHtml(d.role_name)}</span>` : ''}</span>
                <span class="text-muted" style="text-transform:capitalize;">${escapeHtml(d.cast_role)}</span>
              </div>
            `).join('');
          } catch (err) {
            panel.innerHTML = '<span class="text-danger">Could not load cast list.</span>';
          }
        });
      } catch (err) {
        document.getElementById('loading-msg').textContent = 'Could not load your pieces.';
      }
    }

    loadPieces();
  </script>

  <script>
    (async () => {
      try {
        const res  = await fetch('/api/auth/me');
        const user = await res.json();
        if (!res.ok || (!user.isStaff && user.role !== 'staff')) { window.location.href = 'login.html'; return; }
        document.getElementById('right-nav').innerHTML =
          `<a href="account.html">Account</a>` +
          (user.isDirector ? `<button id="switch-director-btn">Switch to Director</button>` : '') +
          `<button id="switch-auditionee-btn">Switch to Auditionee</button>
           <button class="btn-nav-logout" id="logout-btn">Log Out</button>`;
        if (user.isDirector) {
          document.getElementById('switch-director-btn').addEventListener('click', async () => {
            await fetch('/api/auth/switch-mode', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ mode:'director' }) });
            window.location.href = 'org-select.html';
          });
        }
        document.getElementById('switch-auditionee-btn').addEventListener('click', async () => {
          await fetch('/api/auth/switch-mode', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ mode:'auditionee' }) });
          window.location.href = 'auditionForm.html';
        });
        document.getElementById('logout-btn').addEventListener('click', async () => {
          await fetch('/api/auth/logout', { method: 'POST' });
          window.location.href = 'login.html';
        });
        document.body.style.visibility = 'visible';
      } catch (err) {
        window.location.href = 'login.html';
      }
    })();
  </script>

  </div>
</body>
</html>
