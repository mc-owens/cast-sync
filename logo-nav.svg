<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- 3/4 orbit ring -->
  <path d="M16 3 A13 13 0 1 1 4.5 20" stroke="#5b21b6" stroke-width="1.6" stroke-linecap="round"/>
  <!-- Ring accent dot (top right) -->
  <circle cx="27" cy="10" r="1.8" fill="#5b21b6"/>
  <!-- Ring accent dot (bottom left) -->
  <circle cx="5" cy="23" r="1.8" fill="#5b21b6"/>
  <!-- Head -->
  <circle cx="17" cy="7" r="3" fill="#5b21b6"/>
  <!-- Left arm sweep (dominant swoosh going left) -->
  <path d="M4 17 C7 11 11 9.5 17 10" stroke="#5b21b6" stroke-width="2.8" stroke-linecap="round"/>
  <!-- Right arm (shorter, going upper right) -->
  <path d="M17 10 C21 10 24 7.5 26 5.5" stroke="#5b21b6" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Body flowing down -->
  <path d="M17 10 C19 16 18 21 16 26" stroke="#5b21b6" stroke-width="2.8" stroke-linecap="round"/>
</svg>
