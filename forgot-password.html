<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password — CastSync</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="logo.png" type="image/png">
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-TYZB1PQQG9"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-TYZB1PQQG9');</script>
</head>
<body>

  <nav class="navbar app-nav">
    <div class="container-fluid">
      <a class="navbar-brand" href="#"><img src="logo-nav.png" width="22" height="22" alt="" style="vertical-align:middle;margin-right:6px;margin-bottom:2px;">CastSync</a>
    </div>
  </nav>

  <div class="container" style="max-width:420px;margin-top:80px;">
    <h4 class="mb-1 fw-semibold">Forgot Password</h4>
    <p class="text-muted mb-4" style="font-size:14px;">Enter your email and we'll send you a reset link.</p>

    <div id="error-msg" class="alert alert-danger d-none"></div>
    <div id="success-msg" class="alert alert-success d-none"></div>

    <form id="forgot-form">
      <div class="mb-3">
        <label for="email" class="form-label">Email</label>
        <input type="email" class="form-control" id="email" required />
      </div>
      <button type="submit" class="btn btn-primary w-100" id="submit-btn">Send Reset Link</button>
    </form>

    <p class="mt-3 text-center" style="font-size:14px;">
      <a href="login.html">Back to Log In</a>
    </p>
  </div>

  <script>
    document.getElementById('forgot-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorEl   = document.getElementById('error-msg');
      const successEl = document.getElementById('success-msg');
      const submitBtn = document.getElementById('submit-btn');
      errorEl.classList.add('d-none');
      successEl.classList.add('d-none');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Sending…';

      try {
        const res  = await fetch('/api/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: document.getElementById('email').value }),
        });
        // Always show success (don't reveal whether email exists)
        successEl.textContent = 'If an account with that email exists, you\'ll receive a reset link shortly.';
        successEl.classList.remove('d-none');
        document.getElementById('forgot-form').reset();
      } catch (err) {
        errorEl.textContent = 'Could not connect to the server.';
        errorEl.classList.remove('d-none');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Send Reset Link';
      }
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
