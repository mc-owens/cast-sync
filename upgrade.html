<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Director Access — CastSync</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="logo.png" type="image/png">
</head>
<body>

  <nav class="navbar app-nav">
    <div class="container-fluid">
      <a class="navbar-brand" href="#"><img src="logo.png" width="20" height="20" alt="" style="vertical-align:middle;margin-right:6px;margin-bottom:2px;">CastSync</a>
    </div>
  </nav>

  <div class="container" style="max-width: 420px; margin-top: 80px;">
    <h4 class="mb-1 fw-semibold">Director Access</h4>
    <p class="text-muted mb-4" style="font-size:14px;">Enter your director access code to upgrade your account.</p>

    <div id="error-msg" class="alert alert-danger d-none"></div>
    <div id="success-msg" class="alert alert-success d-none"></div>

    <form id="upgrade-form">
      <div class="mb-3">
        <label for="master-code" class="form-label">Director Access Code</label>
        <input type="password" class="form-control" id="master-code" placeholder="Enter your access code" required />
      </div>
      <button type="submit" class="btn btn-dark w-100">Upgrade to Director</button>
    </form>

    <p class="mt-3 text-center" style="font-size:14px;">
      <a href="auditionForm.html">Back to Audition Form</a>
    </p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Must be logged in to access this page
    (async () => {
      const res  = await fetch('/api/auth/me').catch(() => null);
      if (!res || !res.ok) { window.location.href = 'login.html'; return; }
      const user = await res.json();
      // Already a director — just switch mode and go
      if (user.isDirector) {
        await fetch('/api/auth/switch-mode', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ mode: 'director' }) });
        window.location.href = 'org-select.html';
        return;
      }
    })();

    document.getElementById('upgrade-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorEl   = document.getElementById('error-msg');
      const successEl = document.getElementById('success-msg');
      errorEl.classList.add('d-none');
      successEl.classList.add('d-none');

      const masterCode = document.getElementById('master-code').value;

      try {
        const res  = await fetch('/api/auth/upgrade', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ masterCode }),
        });
        const data = await res.json();

        if (!res.ok) {
          errorEl.textContent = data.error;
          errorEl.classList.remove('d-none');
          return;
        }

        successEl.textContent = 'Director access granted! Redirecting...';
        successEl.classList.remove('d-none');
        setTimeout(() => { window.location.href = 'org-select.html'; }, 1500);

      } catch (err) {
        errorEl.textContent = 'Could not connect to server.';
        errorEl.classList.remove('d-none');
      }
    });
  </script>
</body>
</html>
